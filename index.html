<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assem Wish-list</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<style>
:root {
  --cream:#faf7f2; --warm:#f0e9de; --gold:#c9a84c; --gold-light:#e8d5a3;
  --dark:#1a1612; --mid:#5c4f3d; --soft:#9e8c76; --accent:#d4614b; --border:#e0d5c5;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--dark);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,.08) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 20%,rgba(212,97,75,.05) 0%,transparent 50%);}
header{text-align:center;padding:40px 24px 28px;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(201,168,76,.06) 0%,transparent 100%);}
header .eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:10px;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,3.2rem);font-weight:700;color:var(--dark);line-height:1.1;}
header h1 em{color:var(--gold);font-style:italic;}
.container{max-width:1100px;margin:0 auto;padding:28px 16px 80px;}
.controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.stats{font-size:13px;color:var(--soft);}
.stats strong{color:var(--mid);font-weight:500;}

/* ИДЕАЛЬНО РОВНЫЕ КНОПКИ И ПОЛЯ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  height: 44px; padding: 0 20px; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .2s; border: 1.5px solid transparent; box-sizing: border-box;
}
.btn-primary { background: var(--dark); color: var(--cream); }
.btn-primary:hover { background: var(--mid); }
.btn-ghost { background: transparent; color: var(--mid); border-color: var(--border); }
.btn-ghost:hover { background: var(--warm); }

.form-input, .search-input {
  height: 44px; padding: 0 14px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; color: var(--dark);
  background: var(--cream); width: 100%; box-sizing: border-box;
}
.form-input:focus, .search-input:focus { border-color: var(--gold); background: white; }
textarea.form-input { height: 80px; padding: 10px 14px; resize: vertical; }

.modal-search { display: flex; gap: 8px; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border); }
.modal-search .search-input { margin-bottom: 0; flex: 1; }

.totals-bar{display:flex;justify-content:flex-end;padding:14px 4px 0;font-size:13px;color:var(--mid);}
.totals-bar .total-label{color:var(--soft);}
.totals-bar .total-val{font-weight:600;color:var(--dark);}

/* ── TABLE ── */
.wishlist-table{width:100%;border-collapse:separate;border-spacing:0;background:white;border-radius:12px;
  overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06),0 8px 32px rgba(0,0,0,.04);border:1px solid var(--border);}
thead tr{background:var(--dark);}
thead th{padding:14px 16px;text-align:left;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-light);font-weight:500;}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--cream);}
tbody tr.checked-row{opacity:.5;}
tbody tr.checked-row td{text-decoration:line-through;color:var(--soft);}
td{padding:14px 16px;vertical-align:middle;font-size:14px;}
.img-slot{width:56px;height:56px;border-radius:8px;border:1.5px dashed var(--border);display:flex;
  align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:var(--cream);}
.img-slot img{width:100%;height:100%;object-fit:cover;border-radius:7px;}
.editable{outline:none;border-radius:4px;padding:3px 5px;margin:-3px -5px;transition:background .15s;min-width:40px;display:inline-block;}
.editable:focus{background:var(--warm);}
.editable[placeholder]:empty::before{content:attr(placeholder);color:var(--border);}
.priority-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;user-select:none;white-space:nowrap;}
.p-high{background:#fde8e4;color:#c0392b;}
.p-mid{background:#fef3cd;color:#856404;}
.p-low{background:#e8f5e9;color:#2e7d32;}

.action-btn {
  background: none; border: none; cursor: pointer; font-size: 15px; color: var(--soft);
  width: 32px; height: 32px; border-radius: 6px; display: inline-flex; 
  align-items: center; justify-content: center; transition: all .15s; line-height: 1;
}
.action-btn:hover { color: var(--dark); background: var(--warm); }

.custom-check{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;transition:all .2s;background:white;}
.custom-check.done{background:var(--gold);border-color:var(--gold);color:white;font-size:11px;}

/* ── MOBILE CARDS ── */
.card-list{display:none;flex-direction:column;gap:12px;}
.card{background:white;border-radius:14px;padding:16px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.05);}
.card-top{display:flex;gap:12px;}
.card-img{width:72px;height:72px;border-radius:10px;border:1.5px dashed var(--border);overflow:hidden;flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--cream); cursor:pointer;}
.card-img img{width:100%;height:100%;object-fit:cover;}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,22,18,.7);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:16px;width:min(640px,95vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.tabs{display:flex;padding:0 20px;gap:4px;border-bottom:1px solid var(--border);}
.tab{padding:12px 14px;font-size:13px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;color:var(--soft);}
.tab.active{color:var(--dark);border-bottom-color:var(--gold);font-weight:600;}
.modal-body{padding:0;overflow-y:auto;flex:1;}

.image-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px; padding: 20px;}
.img-result{border-radius:10px;overflow:hidden;cursor:pointer;border:3px solid transparent;aspect-ratio:1;}
.img-result.selected{border-color:var(--gold);}
.img-result img{width:100%;height:100%;object-fit:cover;}
.edit-form{padding:20px;display:flex;flex-direction:column;gap:15px;}
.form-row{display:flex;flex-direction:column;gap:5px;}
.form-row label{font-size:11px;text-transform:uppercase;color:var(--soft);font-weight:600;}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}

@media(max-width:640px){
  .wishlist-table{display:none;}
  .card-list{display:flex;}
}
#loader { text-align:center; padding: 40px; color: var(--soft); font-size: 14px; }
</style>
</head>
<body>

<header>
  <p class="eyebrow">&#10022; Личная коллекция</p>
  <h1>Assem <em>Wish-list</em></h1>
</header>

<div class="container">
  <div class="controls">
    <div class="stats"><strong id="total-items">0</strong> позиций &middot; <strong id="done-items">0</strong> получено</div>
    <button class="btn btn-primary" onclick="addRow()">+ Добавить</button>
  </div>

  <div id="loader">Загрузка данных из облака...</div>

  <table class="wishlist-table" id="table-container" style="display:none;">
    <thead>
      <tr>
        <th></th><th>Фото</th><th>Название</th><th>Категория</th>
        <th>Приоритет</th><th>Цена</th><th>Ссылка</th><th></th><th></th>
      </tr>
    </thead>
    <tbody id="wishlist-body"></tbody>
  </table>

  <div class="card-list" id="card-list" style="display:none;"></div>

  <div class="totals-bar">
    <span><span class="total-label">Итого: </span><span class="total-val" id="price-total">—</span></span>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 style="font-family:'Playfair Display',serif; font-size:1.15rem;">Выбрать изображение</h2>
      <button class="modal-close" style="border:none;background:none;font-size:20px;cursor:pointer;color:var(--soft)" onclick="closeModal()">✕</button>
    </div>
    <div class="tabs">
      <button class="tab active" id="tab-search" onclick="switchTab('search')">&#128269; Поиск</button>
      <button class="tab" id="tab-url" onclick="switchTab('url')">&#128279; URL</button>
      <button class="tab" id="tab-upload" onclick="switchTab('upload')">&#128228; Загрузить</button>
    </div>
    <div class="modal-body">
      <div id="panel-search">
        <div class="modal-search">
          <input class="search-input" id="search-input" placeholder="Название товара..." onkeydown="if(event.key==='Enter')runSearch()">
          <button class="btn btn-primary" onclick="runSearch()">Найти</button>
        </div>
        <div id="search-results" style="text-align:center; color:var(--soft); padding:20px;">Введите название для поиска</div>
      </div>
      <div id="panel-url" style="display:none; padding:20px;">
        <input type="url" id="url-input" class="form-input" placeholder="https://example.com/image.jpg" oninput="previewUrlImage(this.value)">
        <div id="url-preview" style="margin-top:15px; text-align:center; display:none;"><img id="url-preview-img" style="max-height:160px; border-radius:8px;"></div>
      </div>
      <div id="panel-upload" style="display:none; text-align:center; padding:30px 20px;">
        <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileUpload(this)">
        <button class="btn btn-ghost" onclick="document.getElementById('file-input').click()">📁 Выбрать файл на устройстве</button>
        <div id="upload-preview" style="margin-top:15px; display:none;"><img id="upload-preview-img" style="max-height:160px; border-radius:8px;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="applyImage()">Применить</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal-overlay" onclick="if(event.target===this)closeEditModal()">
  <div class="modal" style="width:min(500px, 95vw)">
    <div class="modal-header">
      <h2 style="font-family:'Playfair Display',serif; font-size:1.15rem;">✎ Редактировать</h2>
      <button class="modal-close" style="border:none;background:none;font-size:20px;cursor:pointer;color:var(--soft)" onclick="closeEditModal()">✕</button>
    </div>
    <div class="edit-form" id="edit-form-content"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEditModal()">Отмена</button>
      <button class="btn btn-primary" onclick="saveEdit()">Сохранить</button>
    </div>
  </div>
</div>

<script>
// --- КОНФИГУРАЦИЯ FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyAQrYMg27mYZ0wzDAZ53bmCbQbz67R2XJQ",
  authDomain: "mywishlist-effa0.firebaseapp.com",
  databaseURL: "https://mywishlist-effa0-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mywishlist-effa0",
  storageBucket: "mywishlist-effa0.firebasestorage.app",
  messagingSenderId: "799767453844",
  appId: "1:799767453844:web:e4ec91ffa40eaa55e99481"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const wishlistRef = db.ref('assem_wishlist_data');

const GOOGLE_API_KEY = 'AIzaSyDXAXW8dLoFzv02eHaPtkFMJCs8PgYrt-k';
const GOOGLE_CX      = '50921117ca92e400d';

let rows = [];
let activeRowId = null;
let selectedImageUrl = null;
let activeTab = 'search';

const PRIORITIES = ['high','mid','low'];
const PRIORITY_LABELS = {high:'🔥 Высокий',mid:'✦ Средний',low:'· Низкий'};
const PRIORITY_CLASSES = {high:'p-high',mid:'p-mid',low:'p-low'};

function uid(){ return Math.random().toString(36).slice(2,11); }

// ФУНКЦИЯ ДЛЯ КРАСИВОГО ФОРМАТИРОВАНИЯ ЦЕНЫ
function formatPriceStr(str) {
  let num = String(str).replace(/[^0-9]/g, '');
  return num ? Number(num).toLocaleString('ru-RU') + ' ₸' : '';
}

// --- СИНХРОНИЗАЦИЯ С ОБЛАКОМ ---
wishlistRef.on('value', (snapshot) => {
  document.getElementById('loader').style.display = 'none';
  if (window.innerWidth > 640) document.getElementById('table-container').style.display = 'table';
  else document.getElementById('card-list').style.display = 'flex';
  
  const data = snapshot.val();
  rows = data ? Object.values(data) : [];
  render();
  updateStats();
});

function saveRowToCloud(row) { wishlistRef.child(row.id).set(row); }
function removeRowFromCloud(id) { wishlistRef.child(id).remove(); }

function addRow(){
  const row = {id:uid(), done:false, image:null, name:'', category:'', priority:'mid', price:'', link:'', note:''};
  saveRowToCloud(row);
}
function deleteRow(id){ removeRowFromCloud(id); }
function toggleDone(id){ 
  const r = rows.find(r=>r.id===id); 
  if(r) { r.done = !r.done; saveRowToCloud(r); }
}
function updateField(id, field, val){
  const r = rows.find(r=>r.id===id); 
  if(r) { r[field] = val; saveRowToCloud(r); }
}
function cyclePriority(id){
  const r = rows.find(r=>r.id===id); if(!r) return;
  r.priority = PRIORITIES[(PRIORITIES.indexOf(r.priority)+1)%PRIORITIES.length];
  saveRowToCloud(r);
}

// --- ОТОБРАЖЕНИЕ ---
function render(){
  const tbody = document.getElementById('wishlist-body');
  const cardList = document.getElementById('card-list');
  
  tbody.innerHTML = rows.map(r=>`
    <tr class="${r.done?'checked-row':''}">
      <td><div class="custom-check ${r.done?'done':''}" onclick="toggleDone('${r.id}')">${r.done?'✓':''}</div></td>
      <td><div class="img-slot" onclick="openImageModal('${r.id}')">${r.image?`<img src="${r.image}">`:'+'}</div></td>
      <td><span class="editable" contenteditable="true" onblur="updateField('${r.id}','name',this.innerText)">${r.name}</span></td>
      <td><span class="editable" contenteditable="true" onblur="updateField('${r.id}','category',this.innerText)">${r.category}</span></td>
      <td><span class="priority-badge ${PRIORITY_CLASSES[r.priority]}" onclick="cyclePriority('${r.id}')">${PRIORITY_LABELS[r.priority]}</span></td>
      <td><span class="editable" contenteditable="true" placeholder="0 ₸" onblur="updateField('${r.id}','price', formatPriceStr(this.innerText))">${r.price || ''}</span></td>
      <td><span class="editable" contenteditable="true" onblur="updateField('${r.id}','link',this.innerText)">${r.link}</span></td>
      <td><button class="action-btn" onclick="openEditModal('${r.id}')">✎</button></td>
      <td><button class="action-btn" onclick="deleteRow('${r.id}')">✕</button></td>
    </tr>
  `).join('');

  cardList.innerHTML = rows.map(r=>`
    <div class="card ${r.done?'checked-card':''}">
      <div class="card-top">
        <div class="card-img" onclick="openImageModal('${r.id}')">${r.image?`<img src="${r.image}">`:'+'}</div>
        <div style="flex:1">
          <div style="font-weight:600">${r.name || 'Название...'}</div>
          <div style="font-size:12px;color:var(--soft)">${r.price || '0 ₸'}</div>
        </div>
        <button class="action-btn" onclick="openEditModal('${r.id}')">✎</button>
      </div>
    </div>
  `).join('');
}

function updateStats(){
  document.getElementById('total-items').textContent = rows.length;
  document.getElementById('done-items').textContent = rows.filter(r=>r.done).length;
  let total = 0;
  rows.forEach(r=>{ let p = parseFloat(String(r.price).replace(/[^0-9.]/g,'')); if(!isNaN(p)) total+=p; });
  document.getElementById('price-total').textContent = total > 0 ? total.toLocaleString('ru-RU') + ' ₸' : '—';
}

// --- ФОТО И ПОИСК ---
function openImageModal(id){ 
  activeRowId = id; selectedImageUrl = null; 
  document.getElementById('modal-overlay').classList.add('open'); 
  document.getElementById('search-results').innerHTML = 'Введите название для поиска';
  switchTab('search'); 
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }

function switchTab(tab){
  activeTab = tab;
  ['search','url','upload'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('panel-'+t).style.display = t===tab ? 'block' : 'none';
  });
}

async function runSearch(){
  const q = document.getElementById('search-input').value.trim();
  if(!q) return;
  
  const container = document.getElementById('search-results');
  container.innerHTML = '<div style="padding: 30px; color: var(--gold);">Загрузка...</div>';
  
  try {
    const res = await fetch(`https://www.googleapis.com/customsearch/v1?key=${GOOGLE_API_KEY}&cx=${GOOGLE_CX}&q=${encodeURIComponent(q)}&searchType=image&num=9`);
    const data = await res.json();
    
    if (data.error) {
      container.innerHTML = `<div style="color: var(--accent); padding: 20px;">Ошибка: ${data.error.message} <br><br><b>Лимит Google закончился.</b> Воспользуйтесь вкладкой "Загрузить".</div>`;
      return;
    }
    if (!data.items || data.items.length === 0) {
      container.innerHTML = '<div style="padding: 20px;">Ничего не найдено.</div>';
      return;
    }
    
    container.innerHTML = '<div class="image-grid">' + data.items.map(i=>`<div class="img-result" onclick="selectImg(this,'${i.link}')"><img src="${i.link}"></div>`).join('') + '</div>';
    
  } catch(error) {
    container.innerHTML = '<div style="color: var(--accent); padding: 20px;">Ошибка соединения.</div>';
  }
}

function selectImg(el, url){ document.querySelectorAll('.img-result').forEach(i=>i.classList.remove('selected')); el.classList.add('selected'); selectedImageUrl = url; }
function previewUrlImage(url){ selectedImageUrl = url; document.getElementById('url-preview-img').src = url; document.getElementById('url-preview').style.display='block'; }

function handleFileUpload(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => { 
    selectedImageUrl = e.target.result; 
    document.getElementById('upload-preview-img').src = e.target.result; 
    document.getElementById('upload-preview').style.display='block'; 
  };
  reader.readAsDataURL(file);
}

function applyImage(){ 
  if(selectedImageUrl){ 
    const r = rows.find(r=>r.id===activeRowId); 
    if(r){
      r.image = selectedImageUrl; 
      saveRowToCloud(r); 
    }
  } 
  closeModal(); 
}

// --- РЕДАКТИРОВАНИЕ В ОКНЕ ---
function openEditModal(id){
  const r = rows.find(r=>r.id === id); activeRowId = id;
  document.getElementById('edit-form-content').innerHTML = `
    <div class="form-row"><label>Название</label><input class="form-input" id="ed-name" value="${r.name||''}"></div>
    <div class="form-row"><label>Категория</label><input class="form-input" id="ed-cat" value="${r.category||''}"></div>
    <div class="form-row"><label>Цена</label><input class="form-input" id="ed-price" value="${r.price||''}" placeholder="0 ₸" oninput="this.value = formatPriceStr(this.value)"></div>
    <div class="form-row"><label>Ссылка</label><input class="form-input" id="ed-link" value="${r.link||''}"></div>
    <div class="form-row"><label>Заметка</label><textarea class="form-input" id="ed-note">${r.note||''}</textarea></div>
  `;
  document.getElementById('edit-modal-overlay').classList.add('open');
}
function closeEditModal(){ document.getElementById('edit-modal-overlay').classList.remove('open'); }
function saveEdit(){
  const r = rows.find(r=>r.id === activeRowId);
  if(r) {
    r.name = document.getElementById('ed-name').value;
    r.category = document.getElementById('ed-cat').value;
    r.price = document.getElementById('ed-price').value;
    r.link = document.getElementById('ed-link').value;
    r.note = document.getElementById('ed-note').value;
    saveRowToCloud(r);
  }
  closeEditModal();
}
</script>
</body>
</html>
